# ========================================
# Render Deployment Configuration
# ========================================
services:
  - type: web
    name: minelytics-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /api/dashboard/metrics
    envVars:
      - key: USE_SQLITE
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.0"
