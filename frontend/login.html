<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enterprise Login - Minelytics</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="bg-slate-950 flex items-center justify-center h-screen text-slate-100"
  >
    <div
      id="app"
      class="bg-slate-900 border border-slate-800 shadow-sm rounded-lg w-full max-w-md p-8"
    >
      <!-- Wordmark -->
      <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-amber-500 tracking-wider">
          MINELYTICS
        </h1>
        <p class="text-xs text-slate-400 mt-1">Fleet Management System</p>
      </div>

      <form @submit.prevent="handleLogin" class="space-y-5">
        <div>
          <label
            class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider"
            >USERNAME</label
          >
          <input
            type="text"
            v-model="username"
            required
            placeholder="Masukkan username"
            class="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-slate-100 placeholder-slate-500 outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500/30 transition text-sm"
          />
        </div>
        <div>
          <label
            class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider"
            >PASSWORD</label
          >
          <input
            type="password"
            v-model="password"
            required
            placeholder="••••••••"
            class="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-slate-100 placeholder-slate-500 outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500/30 transition text-sm"
          />
        </div>
        <p
          v-if="errorMsg"
          class="text-red-400 text-xs font-medium bg-red-500/10 p-2.5 rounded-md border border-red-500/20 text-center"
        >
          {{ errorMsg }}
        </p>
        <button
          type="submit"
          class="w-full bg-amber-500 hover:bg-amber-400 text-slate-950 font-bold p-3 rounded-lg transition text-sm tracking-wider"
        >
          Masuk ke Sistem
        </button>
      </form>
    </div>

    <script>
      // Auto-detect API URL: local vs production
      const API_BASE =
        window.location.hostname === "localhost" ||
        window.location.hostname === "127.0.0.1"
          ? "http://localhost:5000"
          : "";

      const { createApp, ref } = Vue;
      createApp({
        setup() {
          const username = ref("");
          const password = ref("");
          const errorMsg = ref("");

          const handleLogin = async () => {
            errorMsg.value = "";
            try {
              const response = await fetch(API_BASE + "/api/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  username: username.value,
                  password: password.value,
                }),
              });
              const data = await response.json();
              if (response.ok && data.success) {
                // DI SINI KUNCINYA: Membaca role dinamis dari database (data.user.role)
                localStorage.setItem("user_token", data.token);
                localStorage.setItem("user_role", data.user.role);
                window.location.href = "dashboard.html";
              } else {
                errorMsg.value = data.message || "Login Gagal.";
              }
            } catch (err) {
              errorMsg.value = "Gagal terhubung ke Server API Flask.";
            }
          };
          return { username, password, errorMsg, handleLogin };
        },
      }).mount("#app");
    </script>
  </body>
</html>
